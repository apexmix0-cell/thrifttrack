<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PourJudge — Scan & Rate</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<style>
  :root {
    --amber: #C8701A;
    --amber-light: #E8931F;
    --amber-dark: #8B4A0E;
    --cream: #F5EDD8;
    --cream-dark: #EAD9B8;
    --brown: #2A1A0A;
    --brown-mid: #4A2E12;
    --gold: #D4A843;
    --ink: #1A0E05;
    --muted: #8A6A4A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--brown);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  body::after {
    content: '';
    position: fixed;
    top: -30%; right: -20%;
    width: 70%; height: 70%;
    background: radial-gradient(ellipse, rgba(200,112,26,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  header { padding: 2rem 1.5rem 1rem; text-align: center; }
  .logo-wrap { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 0.3rem; }
  .logo-icon { font-size: 1.8rem; filter: drop-shadow(0 0 10px rgba(200,112,26,0.5)); }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--cream) 20%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--amber);
    text-transform: uppercase;
    margin-top: 0.4rem;
  }

  .divider {
    display: flex; align-items: center; gap: 0.8rem;
    margin: 1.2rem auto; max-width: 480px; padding: 0 1.5rem;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
  }
  .divider::before { background: linear-gradient(to right, transparent, var(--amber-dark)); }
  .divider::after { background: linear-gradient(to left, transparent, var(--amber-dark)); }
  .divider span { color: var(--amber); font-size: 0.45rem; }

  main { max-width: 520px; margin: 0 auto; padding: 0 1.2rem 4rem; }

  .scanner-card {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(200,112,26,0.2);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 1rem;
  }

  #scanner-container {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #0a0603;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #scanner-container video {
    width: 100%; height: 100%; object-fit: cover;
  }

  #scanner-container canvas.drawingBuffer {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    opacity: 0.4;
  }

  .viewfinder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 10;
  }

  .vf-box {
    width: 78%; height: 28%; position: relative;
  }

  .vf-corner { position: absolute; width: 22px; height: 22px; }
  .vf-corner.tl { top: 0; left: 0; border-top: 2.5px solid var(--amber); border-left: 2.5px solid var(--amber); border-radius: 2px 0 0 0; }
  .vf-corner.tr { top: 0; right: 0; border-top: 2.5px solid var(--amber); border-right: 2.5px solid var(--amber); border-radius: 0 2px 0 0; }
  .vf-corner.bl { bottom: 0; left: 0; border-bottom: 2.5px solid var(--amber); border-left: 2.5px solid var(--amber); border-radius: 0 0 0 2px; }
  .vf-corner.br { bottom: 0; right: 0; border-bottom: 2.5px solid var(--amber); border-right: 2.5px solid var(--amber); border-radius: 0 0 2px 0; }

  .scan-line {
    position: absolute; left: 4px; right: 4px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--amber), var(--amber-light), var(--amber), transparent);
    animation: scanline 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--amber);
  }

  @keyframes scanline {
    0% { top: 0; opacity: 0.8; }
    50% { opacity: 1; }
    100% { top: 100%; opacity: 0.8; }
  }

  .scanner-idle {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0.8rem; z-index: 5;
  }

  .idle-icon {
    font-size: 3.5rem;
    filter: drop-shadow(0 0 16px rgba(200,112,26,0.4));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .idle-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.15em;
    color: var(--muted); text-transform: uppercase;
  }

  .scanner-controls { padding: 1rem; display: flex; gap: 0.6rem; }

  .btn-scan {
    flex: 1; padding: 0.9rem 1rem;
    background: linear-gradient(135deg, var(--amber) 0%, var(--amber-dark) 100%);
    border: none; border-radius: 12px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(200,112,26,0.3);
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .btn-scan:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,112,26,0.45); }
  .btn-scan:active { transform: translateY(0); }

  .btn-manual {
    padding: 0.9rem 1rem;
    background: rgba(200,112,26,0.1);
    border: 1px solid rgba(200,112,26,0.25);
    border-radius: 12px; color: var(--amber);
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .btn-manual:hover { background: rgba(200,112,26,0.2); }

  .manual-wrap {
    display: none; margin-bottom: 1rem;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(200,112,26,0.2);
    border-radius: 16px; padding: 1rem 1.2rem;
  }

  .manual-label {
    font-family: 'DM Mono', monospace; font-size: 0.62rem;
    letter-spacing: 0.18em; color: var(--amber);
    text-transform: uppercase; margin-bottom: 0.6rem;
  }

  .manual-row { display: flex; gap: 0.5rem; }

  #barcodeInput {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(200,112,26,0.25);
    border-radius: 8px; padding: 0.65rem 0.9rem;
    color: var(--cream);
    font-family: 'DM Mono', monospace; font-size: 0.85rem;
    outline: none; transition: border-color 0.2s;
  }
  #barcodeInput::placeholder { color: var(--muted); }
  #barcodeInput:focus { border-color: var(--amber); }

  .btn-lookup {
    padding: 0.65rem 1rem;
    background: linear-gradient(135deg, var(--amber), var(--amber-dark));
    border: none; border-radius: 8px;
    color: var(--cream); font-size: 0.85rem;
    cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
  }
  .btn-lookup:hover { opacity: 0.9; }

  .status-bar {
    display: none;
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    letter-spacing: 0.1em; color: var(--amber);
    text-align: center; padding: 0.7rem;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .error-box {
    display: none;
    background: rgba(180,40,40,0.1);
    border: 1px solid rgba(180,40,40,0.3);
    border-radius: 12px; padding: 0.9rem 1.1rem;
    margin-bottom: 1rem;
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    color: #F4A0A0; letter-spacing: 0.03em;
  }

  #resultCard {
    display: none;
    background: linear-gradient(145deg, rgba(74,46,18,0.55) 0%, rgba(26,14,5,0.85) 100%);
    border: 1px solid rgba(200,112,26,0.25);
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .product-image-strip {
    width: 100%; max-height: 200px;
    object-fit: contain;
    background: rgba(0,0,0,0.3);
    display: block; padding: 1rem;
  }

  .result-header {
    padding: 1.3rem 1.6rem 1rem;
    border-bottom: 1px solid rgba(200,112,26,0.12);
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 1rem;
  }

  .result-brand {
    font-family: 'DM Mono', monospace; font-size: 0.62rem;
    letter-spacing: 0.18em; color: var(--amber);
    text-transform: uppercase; margin-bottom: 0.2rem;
  }

  .result-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; font-weight: 700;
    color: var(--cream); line-height: 1.2;
  }

  .score-wrap { flex-shrink: 0; position: relative; width: 70px; height: 70px; }
  .score-svg { transform: rotate(-90deg); width: 70px; height: 70px; }
  .score-bg { fill: none; stroke: rgba(200,112,26,0.12); stroke-width: 5; }
  .score-ring { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .score-number {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 900; font-size: 1.25rem;
    color: var(--cream); line-height: 1;
  }
  .score-sub {
    font-family: 'DM Mono', monospace; font-size: 0.42rem;
    letter-spacing: 0.1em; color: var(--amber); text-transform: uppercase;
  }

  .result-body { padding: 1.1rem 1.6rem 1.4rem; }

  .stars-row { display: flex; align-items: center; gap: 0.25rem; margin-bottom: 0.9rem; }
  .star { font-size: 1rem; }
  .star.full { filter: drop-shadow(0 0 3px rgba(212,168,67,0.5)); }
  .star.empty { opacity: 0.18; }
  .stars-val { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); margin-left: 0.3rem; }

  .result-desc { font-size: 0.88rem; line-height: 1.75; color: var(--cream-dark); font-weight: 300; margin-bottom: 1.1rem; }

  .attr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem; margin-bottom: 1.1rem; }
  .attr-item {
    background: rgba(200,112,26,0.07);
    border: 1px solid rgba(200,112,26,0.14);
    border-radius: 10px; padding: 0.65rem 0.85rem;
  }
  .attr-label { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.14em; color: var(--amber); text-transform: uppercase; margin-bottom: 0.2rem; }
  .attr-value { font-size: 0.84rem; color: var(--cream); }

  .section-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.18em; color: var(--amber); text-transform: uppercase; margin-bottom: 0.55rem; }

  .flavor-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.1rem; }
  .flavor-tag {
    font-size: 0.76rem; padding: 0.28rem 0.75rem;
    border-radius: 100px;
    background: rgba(212,168,67,0.09);
    border: 1px solid rgba(212,168,67,0.22);
    color: var(--gold);
  }

  .verdict-bar {
    background: rgba(0,0,0,0.18);
    border-radius: 10px; padding: 0.9rem 1.1rem;
    border: 1px solid rgba(200,112,26,0.1);
  }
  .verdict-label { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.18em; color: var(--amber); text-transform: uppercase; margin-bottom: 0.4rem; }
  .verdict-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.92rem; color: var(--cream); line-height: 1.5; }

  .btn-again {
    display: block; width: 100%; margin-top: 1rem;
    padding: 0.85rem; text-align: center;
    background: rgba(200,112,26,0.1);
    border: 1px solid rgba(200,112,26,0.25);
    border-radius: 12px; color: var(--amber);
    font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-again:hover { background: rgba(200,112,26,0.2); }

  footer {
    text-align: center; padding: 2rem;
    font-family: 'DM Mono', monospace; font-size: 0.58rem;
    letter-spacing: 0.15em; color: var(--brown-mid); text-transform: uppercase;
  }

  @media (max-width: 380px) { .attr-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <span class="logo-icon">🥃</span>
    <h1>PourJudge</h1>
  </div>
  <p class="tagline">Scan · Discover · Rate</p>
</header>

<div class="divider"><span>◆</span></div>

<main>

  <div class="scanner-card">
    <div id="scanner-container">
      <div class="scanner-idle" id="scannerIdle">
        <span class="idle-icon">🍺</span>
        <span class="idle-text">Ready to scan</span>
      </div>
      <div class="viewfinder" id="viewfinder" style="display:none">
        <div class="vf-box">
          <div class="vf-corner tl"></div>
          <div class="vf-corner tr"></div>
          <div class="vf-corner bl"></div>
          <div class="vf-corner br"></div>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>
    <div class="scanner-controls">
      <button class="btn-scan" id="scanBtn">📷 &nbsp;Scan Barcode</button>
      <button class="btn-manual" id="manualToggleBtn">⌨️ Manual</button>
    </div>
  </div>

  <div class="manual-wrap" id="manualWrap">
    <div class="manual-label">Enter Barcode / UPC Manually</div>
    <div class="manual-row">
      <input type="text" id="barcodeInput" placeholder="e.g. 0811834018048" inputmode="numeric">
      <button class="btn-lookup" id="lookupBtn">Look Up</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar">🔍 Looking up drink...</div>
  <div class="error-box" id="errorBox"></div>

  <div id="resultCard">
    <img class="product-image-strip" id="rImg" src="" alt="" style="display:none">
    <div class="result-header">
      <div>
        <div class="result-brand" id="rBrand"></div>
        <div class="result-name" id="rName">—</div>
      </div>
      <div class="score-wrap">
        <svg class="score-svg" viewBox="0 0 70 70">
          <circle class="score-bg" cx="35" cy="35" r="29"/>
          <circle class="score-ring" id="scoreRing" cx="35" cy="35" r="29"
            stroke-dasharray="182.2" stroke-dashoffset="182.2"
            stroke="url(#sg)"/>
          <defs>
            <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#D4A843"/>
              <stop offset="100%" stop-color="#C8701A"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="score-number">
          <span id="scoreNum">—</span>
          <span class="score-sub">/100</span>
        </div>
      </div>
    </div>
    <div class="result-body">
      <div class="stars-row" id="starsRow"></div>
      <p class="result-desc" id="rDesc"></p>
      <div class="attr-grid" id="attrGrid"></div>
      <div id="flavorSection">
        <div class="section-label">Tasting Notes</div>
        <div class="flavor-tags" id="flavorTags"></div>
      </div>
      <div class="verdict-bar">
        <div class="verdict-label">The Verdict</div>
        <p class="verdict-text" id="rVerdict"></p>
      </div>
    </div>
  </div>

  <button class="btn-again" id="againBtn" style="display:none" onclick="resetAll()">↺ &nbsp;Scan Another Drink</button>

</main>

<footer>PourJudge &nbsp;·&nbsp; Open Food Facts &nbsp;·&nbsp; Drink Responsibly</footer>

<script>
const scanBtn         = document.getElementById('scanBtn');
const manualToggleBtn = document.getElementById('manualToggleBtn');
const manualWrap      = document.getElementById('manualWrap');
const barcodeInput    = document.getElementById('barcodeInput');
const lookupBtn       = document.getElementById('lookupBtn');
const statusBar       = document.getElementById('statusBar');
const errorBox        = document.getElementById('errorBox');
const resultCard      = document.getElementById('resultCard');
const scannerIdle     = document.getElementById('scannerIdle');
const viewfinder      = document.getElementById('viewfinder');
const againBtn        = document.getElementById('againBtn');

let scanning = false;
let lastBarcode = null;
let detectionBuffer = [];

// Manual toggle
manualToggleBtn.addEventListener('click', () => {
  const open = manualWrap.style.display === 'block';
  manualWrap.style.display = open ? 'none' : 'block';
  if (!open) setTimeout(() => barcodeInput.focus(), 100);
});

lookupBtn.addEventListener('click', () => {
  const code = barcodeInput.value.trim();
  if (code) fetchProduct(code);
});

barcodeInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const code = barcodeInput.value.trim();
    if (code) fetchProduct(code);
  }
});

// Scanner
scanBtn.addEventListener('click', () => {
  if (scanning) stopScanner();
  else startScanner();
});

function startScanner() {
  scanning = true;
  scanBtn.innerHTML = '⏹ &nbsp;Stop';
  scannerIdle.style.display = 'none';
  viewfinder.style.display = 'flex';

  Quagga.init({
    inputStream: {
      name: 'Live',
      type: 'LiveStream',
      target: document.getElementById('scanner-container'),
      constraints: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    },
    locator: { patchSize: 'medium', halfSample: true },
    numOfWorkers: 2,
    frequency: 10,
    decoder: {
      readers: ['ean_reader','ean_8_reader','upc_reader','upc_e_reader','code_128_reader']
    },
    locate: true
  }, err => {
    if (err) {
      showError('📵 Camera not available: ' + (err.message || err) + '. Use manual entry below.');
      stopScanner();
      manualWrap.style.display = 'block';
      barcodeInput.focus();
      return;
    }
    Quagga.start();
  });

  Quagga.onDetected(onDetected);
}

function stopScanner() {
  scanning = false;
  Quagga.offDetected(onDetected);
  try { Quagga.stop(); } catch(e) {}
  scanBtn.innerHTML = '📷 &nbsp;Scan Barcode';
  viewfinder.style.display = 'none';
  scannerIdle.style.display = 'flex';
}

function onDetected(result) {
  const code = result.codeResult.code;
  if (!code || code === lastBarcode) return;
  detectionBuffer.push(code);
  if (detectionBuffer.length > 6) detectionBuffer.shift();
  const counts = {};
  detectionBuffer.forEach(c => counts[c] = (counts[c]||0)+1);
  const hit = Object.entries(counts).find(([,v]) => v >= 3);
  if (hit) {
    lastBarcode = hit[0];
    detectionBuffer = [];
    stopScanner();
    fetchProduct(hit[0]);
  }
}

// Open Food Facts lookup
async function fetchProduct(barcode) {
  showStatus('🔍 Looking up drink...');
  hideError();
  resultCard.style.display = 'none';
  againBtn.style.display = 'none';

  let product = null;

  // Try Open Food Facts first (best database)
  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
    const data = await res.json();
    if (data.status === 1 && data.product) product = data.product;
  } catch(e) {}

  // Fallback: Open Beer Facts
  if (!product) {
    try {
      const res = await fetch(`https://world.openbeerfacts.org/api/v0/product/${barcode}.json`);
      const data = await res.json();
      if (data.status === 1 && data.product) product = data.product;
    } catch(e) {}
  }

  hideStatus();

  if (!product) {
    showError(`⚠ No drink found for barcode "${barcode}". Double-check the number or try scanning again.`);
    againBtn.style.display = 'block';
    return;
  }

  renderProduct(product);
}

function renderProduct(p) {
  const name   = p.product_name || p.product_name_en || p.abbreviated_product_name || 'Unknown Drink';
  const brand  = p.brands || '';
  const category = detectCategory(p);

  document.getElementById('rBrand').textContent = brand.toUpperCase();
  document.getElementById('rName').textContent = name;

  // Image
  const imgEl = document.getElementById('rImg');
  const imgSrc = p.image_front_url || p.image_url || p.image_front_small_url || '';
  if (imgSrc) {
    imgEl.src = imgSrc;
    imgEl.style.display = 'block';
    imgEl.onerror = () => { imgEl.style.display = 'none'; };
  } else {
    imgEl.style.display = 'none';
  }

  // Score
  const score = generateScore(p);
  document.getElementById('scoreNum').textContent = score;
  const offset = 182.2 - (score / 100) * 182.2;
  setTimeout(() => { document.getElementById('scoreRing').style.strokeDashoffset = offset; }, 120);

  // Stars
  const stars = Math.round((score / 20) * 2) / 2;
  const starsRow = document.getElementById('starsRow');
  starsRow.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const s = document.createElement('span');
    s.className = 'star';
    if (i <= stars) { s.textContent = '★'; s.classList.add('full'); }
    else { s.textContent = '☆'; s.classList.add('empty'); }
    starsRow.appendChild(s);
  }
  const sv = document.createElement('span');
  sv.className = 'stars-val';
  sv.textContent = stars.toFixed(1) + ' / 5';
  starsRow.appendChild(sv);

  // Description
  document.getElementById('rDesc').textContent = buildDescription(p, name, brand, category);

  // Attributes
  const abv = getABV(p);
  const country = (p.countries || p.manufacturing_places || '').split(',')[0].trim() || 'N/A';
  const quantity = p.quantity || p.serving_size || 'N/A';
  const style = cap(category) || 'Beverage';

  const attrs = [
    { label: 'Style', value: style },
    { label: 'ABV', value: abv },
    { label: 'Country', value: cap(country) },
    { label: 'Size', value: quantity },
  ];

  const attrGrid = document.getElementById('attrGrid');
  attrGrid.innerHTML = '';
  attrs.forEach(a => {
    const el = document.createElement('div');
    el.className = 'attr-item';
    el.innerHTML = `<div class="attr-label">${a.label}</div><div class="attr-value">${a.value}</div>`;
    attrGrid.appendChild(el);
  });

  // Tasting notes
  const notes = buildNotes(p, category);
  const tagsEl = document.getElementById('flavorTags');
  tagsEl.innerHTML = '';
  notes.forEach(n => {
    const t = document.createElement('span');
    t.className = 'flavor-tag';
    t.textContent = n;
    tagsEl.appendChild(t);
  });

  // Verdict
  document.getElementById('rVerdict').textContent = buildVerdict(name, brand, score, category);

  resultCard.style.display = 'block';
  againBtn.style.display = 'block';
  setTimeout(() => resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function detectCategory(p) {
  const cats = (p.categories_tags || []).join(' ') + ' ' + (p.categories || '') + ' ' + (p.product_name || '');
  const c = cats.toLowerCase();
  if (c.includes('india pale ale') || c.includes(' ipa')) return 'India Pale Ale';
  if (c.includes('pale ale')) return 'Pale Ale';
  if (c.includes('stout')) return 'Stout';
  if (c.includes('porter')) return 'Porter';
  if (c.includes('wheat') || c.includes('weiss') || c.includes('hefeweizen')) return 'Wheat Beer';
  if (c.includes('lager')) return 'Lager';
  if (c.includes('pilsner') || c.includes('pilsen')) return 'Pilsner';
  if (c.includes('sour') || c.includes('gose') || c.includes('lambic')) return 'Sour Beer';
  if (c.includes('saison') || c.includes('farmhouse')) return 'Saison';
  if (c.includes('amber ale') || c.includes('red ale')) return 'Amber Ale';
  if (c.includes('blonde') || c.includes('golden ale')) return 'Blonde Ale';
  if (c.includes('cider')) return 'Cider';
  if (c.includes('beer') || c.includes('ale') || c.includes('biere') || c.includes('cerveza')) return 'Beer';
  if (c.includes('bourbon')) return 'Bourbon';
  if (c.includes('scotch')) return 'Scotch Whisky';
  if (c.includes('whisky') || c.includes('whiskey')) return 'Whiskey';
  if (c.includes('vodka')) return 'Vodka';
  if (c.includes('gin')) return 'Gin';
  if (c.includes('rum')) return 'Rum';
  if (c.includes('tequila') || c.includes('mezcal')) return 'Tequila';
  if (c.includes('champagne')) return 'Champagne';
  if (c.includes('prosecco')) return 'Prosecco';
  if (c.includes('red wine') || c.includes('vin rouge')) return 'Red Wine';
  if (c.includes('white wine') || c.includes('vin blanc')) return 'White Wine';
  if (c.includes('wine') || c.includes('vin')) return 'Wine';
  return 'Beverage';
}

function getABV(p) {
  if (p.alcohol_100g) return p.alcohol_100g + '%';
  if (p.nutriments && p.nutriments['alcohol']) return p.nutriments['alcohol'] + '%';
  const text = [p.product_name, p.generic_name, p.labels, p.categories].join(' ');
  const m = text.match(/(\d+[.,]\d+)\s*%\s*(?:vol|abv|alc)/i) || text.match(/(\d+[.,]\d+)\s*%/);
  return m ? m[1].replace(',','.') + '%' : 'N/A';
}

function generateScore(p) {
  let s = 71;
  if (p.product_name) s += 3;
  if (p.brands) s += 2;
  if (p.image_front_url || p.image_url) s += 3;
  if (p.ingredients_text && p.ingredients_text.length > 20) s += 4;
  if (p.countries) s += 2;
  if (p.quantity) s += 1;
  const ns = (p.nutriscore_grade || p.nutrition_grade_fr || '').toLowerCase();
  const nsMap = { a:7, b:4, c:1, d:-2, e:-4 };
  if (nsMap[ns] !== undefined) s += nsMap[ns];
  // Deterministic variance from barcode
  const code = parseInt((p.code||'0').slice(-6), 10);
  s += (code % 9) - 4;
  return Math.min(98, Math.max(54, Math.round(s)));
}

function buildDescription(p, name, brand, category) {
  const country = (p.countries || '').split(',')[0].trim();
  const abv = getABV(p);
  let d = `${brand ? brand + "'s " : ''}${name} is a ${category.toLowerCase()}`;
  if (country) d += ` from ${country}`;
  d += '.';
  if (abv && abv !== 'N/A') d += ` Coming in at ${abv} ABV,`;
  if (p.ingredients_text) {
    const ingr = p.ingredients_text.substring(0, 90).toLowerCase().replace(/\.$/, '');
    d += ` it's crafted with ${ingr}…`;
  } else {
    d += ` it's a well-regarded expression of its style.`;
  }
  return d;
}

function buildNotes(p, category) {
  const notes = new Set();
  const i = (p.ingredients_text || '').toLowerCase();
  const c = category.toLowerCase();

  if (i.includes('hop')) notes.add('Hoppy');
  if (i.includes('malt') || i.includes('barley')) notes.add('Malty');
  if (i.includes('wheat')) notes.add('Wheaty');
  if (i.includes('oat')) notes.add('Creamy');
  if (i.includes('citrus') || i.includes('lemon') || i.includes('orange')) notes.add('Citrus');
  if (i.includes('caramel')) notes.add('Caramel');
  if (i.includes('chocolate') || i.includes('cocoa')) notes.add('Chocolate');
  if (i.includes('coffee')) notes.add('Coffee');
  if (i.includes('vanilla')) notes.add('Vanilla');
  if (i.includes('honey')) notes.add('Honey');
  if (i.includes('spice') || i.includes('coriander') || i.includes('ginger')) notes.add('Spiced');
  if (i.includes('yeast')) notes.add('Yeasty');
  if (i.includes('oak')) notes.add('Oaky');
  if (i.includes('fruit')) notes.add('Fruity');

  if (notes.size < 3) {
    const defaults = {
      'india pale ale': ['Hoppy','Citrus','Bitter','Resinous','Tropical'],
      'pale ale': ['Floral','Fruity','Balanced','Malty','Crisp'],
      'stout': ['Roasted','Chocolate','Coffee','Dark','Velvety'],
      'porter': ['Roasted','Dark Fruit','Earthy','Smoky','Rich'],
      'wheat beer': ['Banana','Clove','Hazy','Soft','Refreshing'],
      'lager': ['Crisp','Clean','Light','Refreshing','Smooth'],
      'pilsner': ['Crisp','Floral','Bitter','Clean','Golden'],
      'sour beer': ['Tart','Funky','Bright','Acidic','Fruity'],
      'saison': ['Spiced','Earthy','Fruity','Dry','Peppery'],
      'amber ale': ['Caramel','Toasty','Malty','Smooth','Rich'],
      'cider': ['Apple','Crisp','Tart','Refreshing','Dry'],
      'bourbon': ['Vanilla','Caramel','Oak','Spice','Warm'],
      'scotch whisky': ['Smoky','Peaty','Oak','Dried Fruit','Smooth'],
      'whiskey': ['Vanilla','Honey','Spice','Oak','Mellow'],
      'gin': ['Juniper','Floral','Citrus','Herbal','Crisp'],
      'rum': ['Molasses','Vanilla','Tropical','Sweet','Warm'],
      'red wine': ['Tannic','Dark Fruit','Oak','Earthy','Dry'],
      'white wine': ['Crisp','Citrus','Mineral','Floral','Dry'],
    };
    const key = Object.keys(defaults).find(k => c.includes(k));
    (defaults[key] || ['Smooth','Balanced','Clean','Refreshing','Pleasant']).forEach(n => notes.add(n));
  }

  return [...notes].slice(0, 5);
}

function buildVerdict(name, brand, score, category) {
  if (score >= 90) return `${name} is an exceptional ${category.toLowerCase()} — seek it out and savour every drop.`;
  if (score >= 82) return `A very solid pour from ${brand || 'this producer'} — well worth cracking open.`;
  if (score >= 74) return `Reliably good and exactly what a ${category.toLowerCase()} should be on a good day.`;
  if (score >= 65) return `A decent option — nothing groundbreaking, but it gets the job done nicely.`;
  return `An acquired taste — approach with an open mind and moderate expectations.`;
}

function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function showStatus(m) { statusBar.textContent = m; statusBar.style.display = 'block'; }
function hideStatus() { statusBar.style.display = 'none'; }
function showError(m) { errorBox.textContent = m; errorBox.style.display = 'block'; }
function hideError() { errorBox.style.display = 'none'; }

function resetAll() {
  resultCard.style.display = 'none';
  againBtn.style.display = 'none';
  hideError(); hideStatus();
  lastBarcode = null; detectionBuffer = [];
  scannerIdle.style.display = 'flex';
  viewfinder.style.display = 'none';
  if (scanning) stopScanner();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
